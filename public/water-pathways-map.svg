<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Water Pathways learning map</title>
  <desc id="desc">Six phases of a beginner-friendly California D1 and D2 water distribution study path.</desc>
  <rect width="1200" height="630" fill="#075f63"/>
  <circle cx="1080" cy="70" r="185" fill="#168a88" opacity=".7"/>
  <circle cx="1010" cy="650" r="260" fill="#063f44"/>
  <g font-family="Arial, sans-serif">
    <text x="75" y="82" fill="#9ce0d7" font-size="18" font-weight="700" letter-spacing="3">CALIFORNIA D1 / D2 STUDY PATH</text>
    <text x="75" y="145" fill="#ffffff" font-family="Georgia, serif" font-size="55" font-weight="700">Water Pathways</text>
    <text x="75" y="188" fill="#d5edeb" font-size="23">Plain-language exam prep for future water distribution operators.</text>
    <g transform="translate(75 250)"><rect width="325" height="120" rx="15" fill="#f7f5ef"/><circle cx="35" cy="34" r="17" fill="#ef7e52"/><text x="29" y="40" fill="#fff" font-weight="700">1</text><text x="65" y="40" fill="#18383c" font-size="18" font-weight="700">Start with water basics</text><text x="25" y="78" fill="#607779" font-size="14"><tspan x="25">How water reaches a home</tspan><tspan x="25" dy="19">+ D1/D2 roadmap</tspan></text></g>
    <g transform="translate(437 250)"><rect width="325" height="120" rx="15" fill="#f7f5ef"/><circle cx="35" cy="34" r="17" fill="#ef7e52"/><text x="29" y="40" fill="#fff" font-weight="700">2</text><text x="65" y="40" fill="#18383c" font-size="18" font-weight="700">Learn the system</text><text x="25" y="78" fill="#607779" font-size="14"><tspan x="25">Pipes, valves, hydrants,</tspan><tspan x="25" dy="19">tanks, and maps</tspan></text></g>
    <g transform="translate(799 250)"><rect width="325" height="120" rx="15" fill="#f7f5ef"/><circle cx="35" cy="34" r="17" fill="#ef7e52"/><text x="29" y="40" fill="#fff" font-weight="700">3</text><text x="65" y="40" fill="#18383c" font-size="18" font-weight="700">Protect water quality</text><text x="25" y="78" fill="#607779" font-size="14"><tspan x="25">Disinfection, sampling,</tspan><tspan x="25" dy="19">backflow, regulations</tspan></text></g>
    <g transform="translate(75 400)"><rect width="325" height="120" rx="15" fill="#c8f0e9"/><circle cx="35" cy="34" r="17" fill="#075f63"/><text x="29" y="40" fill="#fff" font-weight="700">4</text><text x="65" y="40" fill="#18383c" font-size="18" font-weight="700">Build calculation skills</text><text x="25" y="78" fill="#426566" font-size="14"><tspan x="25">Flow, pressure, volume,</tspan><tspan x="25" dy="19">velocity, and dosage</tspan></text></g>
    <g transform="translate(437 400)"><rect width="325" height="120" rx="15" fill="#c8f0e9"/><circle cx="35" cy="34" r="17" fill="#075f63"/><text x="29" y="40" fill="#fff" font-weight="700">5</text><text x="65" y="40" fill="#18383c" font-size="18" font-weight="700">Operate safely</text><text x="25" y="78" fill="#426566" font-size="14"><tspan x="25">Maintenance, inspection,</tspan><tspan x="25" dy="19">safety, emergencies</tspan></text></g>
    <g transform="translate(799 400)"><rect width="325" height="120" rx="15" fill="#c8f0e9"/><circle cx="35" cy="34" r="17" fill="#075f63"/><text x="29" y="40" fill="#fff" font-weight="700">6</text><text x="65" y="40" fill="#18383c" font-size="18" font-weight="700">Practice for D2 depth</text><text x="25" y="78" fill="#426566" font-size="14"><tspan x="25">Diagnostics, maps, equipment,</tspan><tspan x="25" dy="19">and scenario thinking</tspan></text></g>
    <text x="75" y="581" fill="#f6c06a" font-size="17" font-weight="700" letter-spacing="1">LEARN → PRACTICE → REVIEW → DIAGNOSE</text>
  </g>
</svg>
