<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Water Pathways learning map</title><desc id="desc">Six phases of a beginner-friendly California D1 and D2 water distribution study path.</desc>
  <rect width="1200" height="630" fill="#075f63"/><circle cx="1070" cy="80" r="190" fill="#168a88" opacity=".7"/><circle cx="1010" cy="650" r="260" fill="#063f44"/>
  <text x="75" y="91" fill="#9ce0d7" font-family="Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="3">CALIFORNIA D1 / D2 STUDY PATH</text><text x="75" y="154" fill="#fff" font-family="Georgia, serif" font-size="55" font-weight="700">Water Pathways</text><text x="75" y="195" fill="#d5edeb" font-family="Arial, sans-serif" font-size="23">Plain-language exam prep for future water distribution operators.</text>
  <g font-family="Arial, sans-serif"><g transform="translate(75 265)"><rect width="325" height="112" rx="15" fill="#f7f5ef"/><circle cx="35" cy="34" r="17" fill="#ef7e52"/><text x="29" y="40" fill="#fff" font-weight="700">1</text><text x="65" y="39" fill="#18383c" font-size="19" font-weight="700">Start with water basics</text><text x="25" y="76" fill="#607779" font-size="15">How water reaches a home + D1/D2 roadmap</text></g><g transform="translate(437 265)"><rect width="325" height="112" rx="15" fill="#f7f5ef"/><circle cx="35" cy="34" r="17" fill="#ef7e52"/><text x="29" y="40" fill="#fff" font-weight="700">2</text><text x="65" y="39" fill="#18383c" font-size="19" font-weight="700">Learn the system</text><text x="25" y="76" fill="#607779" font-size="15">Pipes, valves, hydrants, tanks, and maps</text></g><g transform="translate(799 265)"><rect width="325" height="112" rx="15" fill="#f7f5ef"/><circle cx="35" cy="34" r="17" fill="#ef7e52"/><text x="29" y="40" fill="#fff" font-weight="700">3</text><text x="65" y="39" fill="#18383c" font-size="19" font-weight="700">3</text><text x="65" y="39" fill="#18383c" font-size="19" font-weight="700">Protect water quality</text><text x="25" y="76" fill="#607779" font-size="15">Disinfection, sampling, backflow, regulations</text></g><g transform="translate(75 406)"><rect width="325" height="112" rx="15" fill="#c8f0e9"/><circle cx="35" cy="34" r="17" fill="#075f63"/><text x="29" y="40" fill="#fff" font-weight="700">4</text><text x="65" y="39" fill="#18383c" font-size="19" font-weight="700">Build calculation confidence</text><text x="25" y="76" fill="#426566" font-size="15">Flow, pressure, volume, velocity, dosage</text></g><g transform="translate(437 406)"><rect width="325" height="112" rx="15" fill="#c8f0e9"/><circle cx="35" cy="34" r="17" fill="#075f63"/><text x="29" y="40" fill="#fff" font-weight="700">5</text><text x="65" y="39" fill="#18383c" font-size="19" font-weight="700">Operate safely</text><text x="25" y="76" fill="#426566" font-size="15">Maintenance, inspections, safety, emergencies</text></g><g transform="translate(799 406)"><rect width="325" height="112" rx="15" fill="#c8f0e9"/><circle cx="35" cy="34" r="17" fill="#075f63"/><text x="29" y="40" fill="#fff" font-weight="700">6</text><text x="65" y="39" fill="#18383c" font-size="19" font-weight="700">Practice for D2 depth</text><text x="25" y="76" fill="#426566" font-size="15">Diagnostics, maps, equipment, scenario thinking</text></g></g>
  <text x="75" y="581" fill="#f6c06a" font-family="Arial, sans-serif" font-size="17" font-weight="700">LEARN → PRACTICE → REVIEW → DIAGNOSE</text>
</svg>
